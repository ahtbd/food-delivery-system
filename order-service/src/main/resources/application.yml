server:
  port: 8081

spring:
  application:
    name: order-service
  
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/order_db
    username: postgres
    password: postgres
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fooddelivery.order: DEBUG
    org.springframework.data.r2dbc: DEBUG

# ✅ Add Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,trace
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true