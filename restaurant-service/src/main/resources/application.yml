server:
  port: 8082

spring:
  application:
    name: restaurant-service
  
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/restaurant_db
    username: postgres
    password: postgres

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fooddelivery.restaurant: DEBUG
    org.springframework.data.r2dbc: DEBUG